syntax = "proto3";

package credit.v1;

option go_package = "github.com/MarkoPoloResearchLab/ledger/api/credit/v1;creditv1";

message Empty {
  string entry_id = 1;
  int64 created_unix_utc = 2;
}

message Amount {
  int64 amount_cents = 1;
}

message BalanceRequest {
  string user_id = 1;
  string ledger_id = 2;
  string tenant_id = 3;
}

message BalanceResponse {
  int64 total_cents = 1;
  int64 available_cents = 2;
}

message GrantRequest {
  string user_id = 1;
  int64 amount_cents = 2;
  string idempotency_key = 3;
  int64 expires_at_unix_utc = 4;
  string metadata_json = 5;
  string ledger_id = 6;
  string tenant_id = 7;
}

message ReserveRequest {
  string user_id = 1;
  int64 amount_cents = 2;
  string reservation_id = 3;
  string idempotency_key = 4;
  string metadata_json = 5;
  string ledger_id = 6;
  string tenant_id = 7;
  int64 expires_at_unix_utc = 8;
}

message CaptureRequest {
  string user_id = 1;
  string reservation_id = 2;
  string idempotency_key = 3;
  int64 amount_cents = 4;
  string metadata_json = 5;
  string ledger_id = 6;
  string tenant_id = 7;
}

message ReleaseRequest {
  string user_id = 1;
  string reservation_id = 2;
  string idempotency_key = 3;
  string metadata_json = 4;
  string ledger_id = 5;
  string tenant_id = 6;
}

message SpendRequest {
  string user_id = 1;
  int64 amount_cents = 2;
  string idempotency_key = 3;
  string metadata_json = 4;
  string ledger_id = 5;
  string tenant_id = 6;
}

message RefundRequest {
  string user_id = 1;
  string ledger_id = 2;
  string tenant_id = 3;
  oneof original {
    string original_entry_id = 4;
    string original_idempotency_key = 5;
  }
  int64 amount_cents = 6;
  string idempotency_key = 7;
  string metadata_json = 8;
}

message RefundResponse {
  string entry_id = 1;
  int64 created_unix_utc = 2;
}

message Entry {
  string entry_id = 1;
  string account_id = 2;
  string type = 3;
  int64 amount_cents = 4;
  string reservation_id = 5;
  string idempotency_key = 6;
  int64 expires_at_unix_utc = 7;
  string metadata_json = 8;
  int64 created_unix_utc = 9;
  string refund_of_entry_id = 10;
}

message ListEntriesRequest {
  string user_id = 1;
  int64 before_unix_utc = 2;
  int32 limit = 3;
  string ledger_id = 4;
  string tenant_id = 5;
  repeated string types = 6;
  string reservation_id = 7;
  string idempotency_key_prefix = 8;
}

message ListEntriesResponse {
  repeated Entry entries = 1;
}

message Reservation {
  string reservation_id = 1;
  int64 amount_cents = 2;
  string status = 3;
  int64 expires_at_unix_utc = 4;
  int64 created_unix_utc = 5;
  int64 updated_unix_utc = 6;
  bool expired = 7;
  int64 held_cents = 8;
  int64 captured_cents = 9;
}

message GetReservationRequest {
  string user_id = 1;
  string ledger_id = 2;
  string tenant_id = 3;
  string reservation_id = 4;
}

message GetReservationResponse {
  Reservation reservation = 1;
}

message ListReservationsRequest {
  string user_id = 1;
  string ledger_id = 2;
  string tenant_id = 3;
  int64 before_created_unix_utc = 4;
  int32 limit = 5;
  repeated string statuses = 6;
}

message ListReservationsResponse {
  repeated Reservation reservations = 1;
}

message AccountContext {
  string user_id = 1;
  string ledger_id = 2;
  string tenant_id = 3;
}

message BatchGrantOp {
  int64 amount_cents = 1;
  string idempotency_key = 2;
  int64 expires_at_unix_utc = 3;
  string metadata_json = 4;
}

message BatchReserveOp {
  int64 amount_cents = 1;
  string reservation_id = 2;
  string idempotency_key = 3;
  string metadata_json = 4;
  int64 expires_at_unix_utc = 5;
}

message BatchCaptureOp {
  string reservation_id = 1;
  string idempotency_key = 2;
  int64 amount_cents = 3;
  string metadata_json = 4;
}

message BatchReleaseOp {
  string reservation_id = 1;
  string idempotency_key = 2;
  string metadata_json = 3;
}

message BatchSpendOp {
  int64 amount_cents = 1;
  string idempotency_key = 2;
  string metadata_json = 3;
}

message BatchRefundOp {
  oneof original {
    string original_entry_id = 1;
    string original_idempotency_key = 2;
  }
  int64 amount_cents = 3;
  string idempotency_key = 4;
  string metadata_json = 5;
}

message BatchOperation {
  string operation_id = 1;
  oneof operation {
    BatchGrantOp grant = 2;
    BatchSpendOp spend = 3;
    BatchReserveOp reserve = 4;
    BatchCaptureOp capture = 5;
    BatchReleaseOp release = 6;
    BatchRefundOp refund = 7;
  }
}

message BatchRequest {
  AccountContext account = 1;
  repeated BatchOperation operations = 2;
  bool atomic = 3;
}

message BatchOperationResult {
  string operation_id = 1;
  bool ok = 2;
  string error_code = 3;
  string error_message = 4;
  string entry_id = 5;
  int64 created_unix_utc = 6;
  bool duplicate = 7;
}

message BatchResponse {
  repeated BatchOperationResult results = 1;
}

service CreditService {
  rpc GetBalance(BalanceRequest) returns (BalanceResponse);
  rpc Grant(GrantRequest) returns (Empty);
  rpc Reserve(ReserveRequest) returns (Empty);
  rpc Capture(CaptureRequest) returns (Empty);
  rpc Release(ReleaseRequest) returns (Empty);
  rpc Spend(SpendRequest) returns (Empty);
  rpc Refund(RefundRequest) returns (RefundResponse);
  rpc Batch(BatchRequest) returns (BatchResponse);
  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
  rpc GetReservation(GetReservationRequest) returns (GetReservationResponse);
  rpc ListReservations(ListReservationsRequest) returns (ListReservationsResponse);
}
