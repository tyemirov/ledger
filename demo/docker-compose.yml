services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    pull_policy: always
    env_file:
      - ../.env.postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - ledger_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ledger:
    image: ghcr.io/tyemirov/ledger:latest
    container_name: ledger-ledger
    pull_policy: always
    env_file:
      - ../.env.ledger
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "50051:50051"
    restart: unless-stopped

  tauth:
    image: ghcr.io/tyemirov/tauth:latest
    container_name: ledger-tauth
    pull_policy: always
    env_file:
      - ./.env.tauth
    volumes:
      - tauth_data:/data
      - ./tauth.config.yaml:/config.yaml:ro
    ports:
      - "8081:8080"
    restart: unless-stopped

  demoapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: ledger-demoapi:latest
    container_name: ledger-demoapi
    env_file:
      - ./.env.demoapi
    depends_on:
      - ledger
      - tauth
    ports:
      - "9090:9090"
    restart: unless-stopped

  ghttp:
    image: ghcr.io/tyemirov/ghttp:latest
    container_name: ledger-ghttp
    pull_policy: always
    command:
      [
        "--directory",
        "/data",
        "--tls-cert",
        "/certs/computercat-cert.pem",
        "--tls-key",
        "/certs/computercat-key.pem",
        "--proxy",
        "/api=http://demoapi:9090",
        "--proxy",
        "/auth=http://tauth:8080",
        "--proxy",
        "/me=http://tauth:8080",
        "--proxy",
        "/tauth.js=http://tauth:8080",
        "8080",
      ]
    ports:
      - "8080:8080"
      - "4443:8080"
    volumes:
      - ./ui:/data:ro
      - ./config.js:/data/config.js:ro
      - ./certs:/certs:ro
    depends_on:
      - demoapi
      - tauth
    restart: unless-stopped

volumes:
  ledger_postgres_data:
  tauth_data:
