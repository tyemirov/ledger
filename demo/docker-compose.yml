services:
  ledger:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ledger-ledger:local
    container_name: ledger-ledger
    env_file:
      - ./configs/.env.ledger
    command: ["/srv/ledgerd", "--config", "/srv/config.yml"]
    ports:
      - "50051:50051"
    volumes:
      - ledger_data:/srv/data
      - ./configs/config.yml:/srv/config.yml:ro
    restart: unless-stopped

  tauth:
    image: ghcr.io/tyemirov/tauth:latest
    container_name: ledger-tauth
    pull_policy: always
    env_file:
      - ./configs/.env.tauth
    volumes:
      - tauth_data:/data
      - ./configs/tauth.config.yaml:/config.yaml:ro
    ports:
      - "8081:8080"
    restart: unless-stopped

  demoapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: ledger-demoapi:latest
    container_name: ledger-demoapi
    env_file:
      - ./configs/.env.demoapi
    depends_on:
      ledger:
        condition: service_started
      tauth:
        condition: service_started
    ports:
      - "9090:9090"
    restart: unless-stopped

  frontend-localhost:
    profiles:
      - localhost
    image: ghcr.io/tyemirov/ghttp:latest
    container_name: ledger-ghttp-localhost
    pull_policy: always
    depends_on:
      demoapi:
        condition: service_started
      tauth:
        condition: service_started
    command:
      [
        "--directory",
        "/data",
        "--proxy",
        "/api=http://demoapi:9090",
        "--proxy",
        "/auth=http://tauth:8080",
        "--proxy",
        "/me=http://tauth:8080",
        "--proxy",
        "/tauth.js=http://tauth:8080",
        "8000",
      ]
    ports:
      - "8000:8000"
    volumes:
      - ./ui:/data:ro
      - ./config.js:/data/config.js:ro
    restart: unless-stopped

  frontend-computercat:
    profiles:
      - computercat
    image: ghcr.io/tyemirov/ghttp:latest
    container_name: ledger-ghttp-computercat
    pull_policy: always
    depends_on:
      demoapi:
        condition: service_started
      tauth:
        condition: service_started
    command:
      [
        "--directory",
        "/data",
        "--tls-cert",
        "/certs/computercat-cert.pem",
        "--tls-key",
        "/certs/computercat-key.pem",
        "--proxy",
        "/api=http://demoapi:9090",
        "--proxy",
        "/auth=http://tauth:8080",
        "--proxy",
        "/me=http://tauth:8080",
        "--proxy",
        "/tauth.js=http://tauth:8080",
        "4443",
      ]
    ports:
      - "4443:4443"
    volumes:
      - ./ui:/data:ro
      - ./config.js:/data/config.js:ro
      - "${DEMO_TLS_CERT_FILE:-/media/share/Drive/exchange/certs/computercat/computercat-cert.pem}:/certs/computercat-cert.pem:ro"
      - "${DEMO_TLS_KEY_FILE:-/media/share/Drive/exchange/certs/computercat/computercat-key.pem}:/certs/computercat-key.pem:ro"
    restart: unless-stopped

volumes:
  tauth_data:
  ledger_data:
