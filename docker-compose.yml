services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - ledger-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  ledgerd:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.ledger
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "50051:50051"
    restart: unless-stopped

volumes:
  ledger-postgres-data: {}
