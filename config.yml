service:
  database_url: "${DATABASE_URL:-sqlite:///tmp/ledger.db}"
  listen_addr: "${GRPC_LISTEN_ADDR:-:50051}"

tenants:
  - id: "default"
    name: "Default Tenant"
    secret_key: "${DEFAULT_TENANT_SECRET:-default-secret}"
  - id: "demo"
    name: "Demo Tenant"
    secret_key: "${DEMO_TENANT_SECRET:-demo-secret}"
